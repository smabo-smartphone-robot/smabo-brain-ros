# slam_toolbox (online async) for building a map from the LD06 /scan while
# driving smabo around. Publishes map -> odom; save the result with the
# slam_toolbox /slam_toolbox/save_map service, then switch to AMCL + map_server.
slam_toolbox:
  ros__parameters:
    use_sim_time: false
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    resolution: 0.05
    max_laser_range: 12.0
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    transform_publish_period: 0.05
    map_update_interval: 2.0
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
